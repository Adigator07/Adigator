<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450" role="img" aria-label="Futuristic advertising intelligence hub with brain-circuit core and flowing data streams to ad cards">
  <defs>
    <linearGradient id="hi-glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f35" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="hi-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#0099CC"/>
    </linearGradient>
    <linearGradient id="hi-violet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <radialGradient id="hi-core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="hi-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <style><![CDATA[
    @keyframes hi-brain-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes hi-stream-flow { to { stroke-dashoffset: -40; } }
    @keyframes hi-ring-pulse { 0%,100% { r: 52; opacity: 0.25; stroke-width: 1; } 50% { r: 68; opacity: 0.85; stroke-width: 2; } }
    @keyframes hi-ring-pulse2 { 0%,100% { r: 78; opacity: 0; } 50% { r: 88; opacity: 0.35; } }
    @keyframes hi-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes hi-card-float { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-6px) rotate(1deg); } }
    @keyframes hi-particle { 0%,100% { opacity: 0.2; transform: translate(0,0) scale(1); } 50% { opacity: 0.9; transform: translate(4px,-6px) scale(1.3); } }
    @keyframes hi-core-glow { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
    @keyframes hi-shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }
    .hi-brain-group { transform-origin: 300px 225px; animation: hi-brain-spin 24s linear infinite; }
    .hi-stream { stroke-dasharray: 8 8; animation: hi-stream-flow 0.9s linear infinite; }
    .hi-ring { animation: hi-ring-pulse 2.5s ease-in-out infinite; }
    .hi-ring-outer { animation: hi-ring-pulse2 2.5s ease-in-out infinite; animation-delay: -0.4s; }
    .hi-observer { animation: hi-float 3.5s ease-in-out infinite; }
    .hi-card { animation: hi-card-float 4.5s ease-in-out infinite; }
    .hi-card:nth-child(2) { animation-delay: -1.1s; }
    .hi-card:nth-child(3) { animation-delay: -2.2s; }
    .hi-card:nth-child(4) { animation-delay: -3.3s; }
    .hi-particle { animation: hi-particle 3s ease-in-out infinite; }
    .hi-core-aura { animation: hi-core-glow 2s ease-in-out infinite; }
    .hi-brain-core, .hi-ad-card, .hi-stream, .hi-observer-eye, .hi-observer-screen { transition: filter 0.5s cubic-bezier(0.34,1.56,0.64,1), transform 0.5s ease; transition-delay: var(--delay, 0s); }
    svg.hovered .hi-brain-core { filter: drop-shadow(0 0 12px #00D4FF) drop-shadow(0 0 32px #00D4FFaa); transform: scale(1.04); }
    svg.hovered .hi-ad-card { filter: drop-shadow(0 0 10px #F59E0B) drop-shadow(0 0 24px #F59E0B99); transform: scale(1.03); }
    svg.hovered .hi-stream { filter: drop-shadow(0 0 8px #7C3AED); stroke: #A78BFA; stroke-width: 2.5; }
    svg.hovered .hi-observer-eye, svg.hovered .hi-observer-screen { filter: drop-shadow(0 0 10px #00D4FF); }
    svg.hovered .hi-observer-left { transform: translateY(-6px); }
    svg.hovered .hi-observer-right { transform: translateY(-6px); }
    svg.hovered .hi-shimmer-bar { opacity: 1; animation: hi-shimmer 1.2s ease-in-out infinite; }
    .hi-observer-left, .hi-observer-right { transition: transform 0.45s ease; }
    svg.is-paused * { animation-play-state: paused !important; }
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
      .hi-brain-group { animation: none !important; }
    }
  ]]></style>
  <script><![CDATA[
    (function () {
      var svg = document.currentScript && document.currentScript.parentElement;
      if (!svg) return;
      svg.querySelectorAll('[data-glow]').forEach(function (el, i) {
        el.style.setProperty('--delay', (i * 0.2) + 's');
      });
      svg.addEventListener('mouseenter', function () { svg.classList.add('hovered'); });
      svg.addEventListener('mouseleave', function () { svg.classList.remove('hovered'); });
    })();
  ]]></script>

  <!-- Ambient particles -->
  <circle class="hi-particle" cx="120" cy="80" r="2" fill="#00D4FF" style="animation-delay:0s"/>
  <circle class="hi-particle" cx="480" cy="100" r="1.5" fill="#7C3AED" style="animation-delay:-1s"/>
  <circle class="hi-particle" cx="540" cy="350" r="2" fill="#F59E0B" style="animation-delay:-2s"/>
  <circle class="hi-particle" cx="60" cy="320" r="1.5" fill="#00D4FF" style="animation-delay:-0.5s"/>

  <!-- Ambient grid -->
  <g opacity="0.15">
    <path d="M0 90h600M0 180h600M0 270h600M0 360h600" stroke="#00D4FF" stroke-width="0.5"/>
    <path d="M100 0v450M200 0v450M300 0v450M400 0v450M500 0v450" stroke="#7C3AED" stroke-width="0.5"/>
  </g>

  <!-- Data streams -->
  <path class="hi-stream" data-glow d="M300 225 C220 180 140 120 90 95" fill="none" stroke="#334155" stroke-width="2"/>
  <path class="hi-stream" data-glow d="M300 225 C380 170 460 110 510 85" fill="none" stroke="#334155" stroke-width="2"/>
  <path class="hi-stream" data-glow d="M300 225 C260 300 200 360 130 390" fill="none" stroke="#334155" stroke-width="2"/>
  <path class="hi-stream" data-glow d="M300 225 C340 310 400 370 470 395" fill="none" stroke="#334155" stroke-width="2"/>

  <!-- Ad cards -->
  <g class="hi-card hi-ad-card" data-glow transform="translate(55,55)">
    <rect width="88" height="68" rx="10" fill="url(#hi-glass)" stroke="#334155" stroke-width="1.5"/>
    <rect x="10" y="10" width="68" height="32" rx="4" fill="#1e293b"/>
    <circle cx="20" cy="52" r="6" fill="#F59E0B" opacity="0.8"/>
    <rect x="32" y="48" width="40" height="6" rx="2" fill="#475569"/>
    <rect x="32" y="58" width="28" height="4" rx="2" fill="#334155"/>
  </g>
  <g class="hi-card hi-ad-card" data-glow transform="translate(455,45)">
    <rect width="88" height="88" rx="10" fill="url(#hi-glass)" stroke="#334155" stroke-width="1.5"/>
    <polygon points="44,18 62,38 44,58 26,38" fill="#7C3AED" opacity="0.5"/>
    <circle cx="44" cy="38" r="10" fill="none" stroke="#00D4FF" stroke-width="2"/>
    <rect x="14" y="68" width="60" height="8" rx="3" fill="#475569"/>
  </g>
  <g class="hi-card hi-ad-card" data-glow transform="translate(45,330)">
    <rect width="96" height="72" rx="10" fill="url(#hi-glass)" stroke="#334155" stroke-width="1.5"/>
    <rect x="8" y="8" width="80" height="36" rx="4" fill="#0f172a"/>
    <path d="M20 26 L36 18 L52 30 L68 22" fill="none" stroke="#00D4FF" stroke-width="2"/>
    <rect x="8" y="52" width="50" height="8" rx="2" fill="#F59E0B" opacity="0.7"/>
  </g>
  <g class="hi-card hi-ad-card" data-glow transform="translate(460,320)">
    <rect width="90" height="78" rx="10" fill="url(#hi-glass)" stroke="#334155" stroke-width="1.5"/>
    <rect x="10" y="10" width="70" height="40" rx="6" fill="#1a1f35"/>
    <rect x="18" y="20" width="54" height="4" rx="1" fill="#64748b"/>
    <rect x="18" y="30" width="40" height="4" rx="1" fill="#475569"/>
    <rect x="10" y="58" width="70" height="12" rx="4" fill="url(#hi-blue)" opacity="0.6"/>
  </g>

  <!-- Left observer -->
  <g class="hi-observer hi-observer-left" transform="translate(95,175)">
    <ellipse cx="28" cy="55" rx="22" ry="8" fill="#0f172a" opacity="0.5"/>
    <rect x="8" y="18" width="40" height="38" rx="8" fill="url(#hi-glass)" stroke="#334155"/>
    <rect class="hi-observer-screen" data-glow x="14" y="24" width="28" height="20" rx="3" fill="#0f172a" stroke="#00D4FF" stroke-width="1" opacity="0.8"/>
    <circle class="hi-observer-eye" data-glow cx="18" cy="12" r="4" fill="#00D4FF"/>
    <circle class="hi-observer-eye" data-glow cx="38" cy="12" r="4" fill="#00D4FF"/>
    <rect x="22" y="4" width="12" height="6" rx="2" fill="#334155"/>
  </g>

  <!-- Right observer -->
  <g class="hi-observer hi-observer-right" transform="translate(465,175)">
    <ellipse cx="28" cy="55" rx="22" ry="8" fill="#0f172a" opacity="0.5"/>
    <rect x="8" y="18" width="40" height="38" rx="8" fill="url(#hi-glass)" stroke="#334155"/>
    <rect class="hi-observer-screen" data-glow x="14" y="24" width="28" height="20" rx="3" fill="#0f172a" stroke="#00D4FF" stroke-width="1" opacity="0.8"/>
    <circle class="hi-observer-eye" data-glow cx="18" cy="12" r="4" fill="#00D4FF"/>
    <circle class="hi-observer-eye" data-glow cx="38" cy="12" r="4" fill="#00D4FF"/>
    <rect x="22" y="4" width="12" height="6" rx="2" fill="#334155"/>
  </g>

  <!-- Brain / circuit core -->
  <g class="hi-brain-group">
    <circle class="hi-ring-outer" cx="300" cy="225" r="78" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0"/>
    <circle class="hi-ring" cx="300" cy="225" r="52" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.4"/>
    <circle class="hi-core-aura" cx="300" cy="225" r="48" fill="url(#hi-core-glow)" opacity="0.5"/>
    <rect class="hi-shimmer-bar" x="250" y="200" width="100" height="50" rx="25" fill="url(#hi-violet)" opacity="0" style="mix-blend-mode:overlay"/>
    <g class="hi-brain-core" data-glow>
      <ellipse cx="300" cy="225" rx="38" ry="34" fill="url(#hi-glass)" stroke="url(#hi-blue)" stroke-width="2"/>
      <path d="M280 210 Q300 195 320 210 Q330 225 320 240 Q300 255 280 240 Q270 225 280 210" fill="none" stroke="#00D4FF" stroke-width="1.5" opacity="0.7"/>
      <circle cx="285" cy="218" r="4" fill="#00D4FF"/>
      <circle cx="315" cy="218" r="4" fill="#00D4FF"/>
      <circle cx="300" cy="235" r="5" fill="#7C3AED"/>
      <path d="M262 225 H278 M322 225 H338 M300 207 V193 M300 257 V271" stroke="#00D4FF" stroke-width="2" stroke-linecap="round"/>
      <path d="M268 205 L278 215 M332 205 L322 215 M268 245 L278 235 M332 245 L322 235" stroke="#7C3AED" stroke-width="1.5" opacity="0.8"/>
      <rect x="292" y="248" width="16" height="8" rx="2" fill="#F59E0B" opacity="0.6"/>
    </g>
  </g>
</svg>
