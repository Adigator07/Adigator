<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450" role="img" aria-label="Isometric AI technology node cluster with energy packets traveling between server nodes and satellite radar">
  <defs>
    <linearGradient id="at-node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="at-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="at-packet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </radialGradient>
  </defs>
  <style><![CDATA[
    @keyframes at-packet-move { 0% { offset-distance: 0%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { offset-distance: 100%; opacity: 0; } }
    @keyframes at-packet-move2 { 0% { offset-distance: 0%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { offset-distance: 100%; opacity: 0; } }
    @keyframes at-sat-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes at-radar { 0% { opacity: 0.3; transform: scale(0.5); } 100% { opacity: 0; transform: scale(1.5); } }
    @keyframes at-star-drift { 0%,100% { opacity: 0.3; transform: translate(0,0); } 50% { opacity: 0.7; transform: translate(3px,-2px); } }
    @keyframes at-ring-expand { 0% { r: 20; opacity: 0.6; } 100% { r: 35; opacity: 0; } }
    .at-satellite { transform-origin: 300px 75px; animation: at-sat-spin 20s linear infinite; }
    .at-radar-arc { transform-origin: 300px 75px; animation: at-radar 2s ease-out infinite; }
    .at-packet { offset-path: path('M150 280 L300 200 L450 280'); animation: at-packet-move 3s linear infinite; }
    .at-packet-b { offset-path: path('M450 280 L300 200 L150 280'); animation: at-packet-move2 3.5s linear infinite; animation-delay: -1.5s; }
    .at-packet-c { offset-path: path('M300 200 L380 320 L220 320 L300 200'); animation: at-packet-move 4s linear infinite; animation-delay: -2s; }
    .at-star { animation: at-star-drift 5s ease-in-out infinite; }
    .at-node-body { transition: filter 0.4s ease; transition-delay: var(--delay, 0s); }
    .at-conn { stroke-dasharray: 6 4; transition: stroke 0.4s ease, filter 0.4s ease; }
    svg.hovered .at-node-body { filter: drop-shadow(0 0 8px #00D4FF) drop-shadow(0 0 18px #00D4FF66); }
    svg.hovered .at-packet, svg.hovered .at-packet-b, svg.hovered .at-packet-c { animation-duration: 1.2s; filter: drop-shadow(0 0 6px #F59E0B); }
    svg.hovered .at-radar-arc { animation-duration: 1s; stroke: #7C3AED; }
    svg.hovered .at-star { opacity: 0.95 !important; }
    @keyframes at-node-pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    @keyframes at-beam { 0% { opacity: 0; transform: scaleX(0); } 50% { opacity: 0.8; } 100% { opacity: 0; transform: scaleX(1); } }
    .at-beam { transform-origin: 300px 75px; animation: at-beam 2s ease-out infinite; }
    .at-node-glow { animation: at-node-pulse 2s ease-in-out infinite; }
    svg.is-paused * { animation-play-state: paused !important; }
    svg.hovered .at-ring-pulse { animation: at-ring-expand 0.8s ease-out forwards; }
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  ]]></style>
  <script><![CDATA[
    (function () {
      var svg = document.currentScript && document.currentScript.parentElement;
      if (!svg) return;
      svg.querySelectorAll('[data-glow]').forEach(function (el, i) {
        el.style.setProperty('--delay', (i * 0.1) + 's');
      });
      svg.addEventListener('mouseenter', function () { svg.classList.add('hovered'); });
      svg.addEventListener('mouseleave', function () { svg.classList.remove('hovered'); });
    })();
  ]]></script>

  <!-- Stars -->
  <circle class="at-star" cx="80" cy="60" r="1.5" fill="#fff" opacity="0.4"/>
  <circle class="at-star" cx="520" cy="90" r="1" fill="#fff" opacity="0.3" style="animation-delay:-2s"/>
  <circle class="at-star" cx="150" cy="40" r="1.2" fill="#00D4FF" opacity="0.5" style="animation-delay:-1s"/>
  <circle class="at-star" cx="450" cy="50" r="1.5" fill="#7C3AED" opacity="0.4" style="animation-delay:-3s"/>
  <circle class="at-star" cx="300" cy="30" r="1" fill="#fff" opacity="0.35"/>
  <circle class="at-star" cx="550" cy="200" r="1.2" fill="#fff" opacity="0.3" style="animation-delay:-1.5s"/>
  <circle class="at-star" cx="50" cy="180" r="1" fill="#F59E0B" opacity="0.4"/>

  <!-- Connection lines -->
  <path class="at-conn" d="M150 280 L300 200 L450 280" fill="none" stroke="#334155" stroke-width="2"/>
  <path class="at-conn" d="M220 320 L300 200 L380 320" fill="none" stroke="#334155" stroke-width="2"/>
  <path class="at-conn" d="M150 280 L220 320 L380 320 L450 280" fill="none" stroke="#334155" stroke-width="1.5" opacity="0.6"/>

  <!-- Energy packets -->
  <circle class="at-packet" r="5" fill="url(#at-packet)"/>
  <circle class="at-packet-b" r="4" fill="url(#at-packet)" opacity="0.8"/>
  <circle class="at-packet-c" r="4.5" fill="url(#at-packet)" opacity="0.9"/>

  <!-- Isometric nodes helper: draw as stacked rects -->
  <!-- Center node -->
  <g class="at-node-body" data-glow transform="translate(300,200)">
    <circle class="at-ring-pulse" cx="0" cy="-10" r="20" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0"/>
    <polygon points="-30,10 0,-20 30,10 0,25" fill="url(#at-top)" stroke="#475569"/>
    <polygon points="-30,10 0,25 0,55 -30,40" fill="url(#at-node)" stroke="#334155"/>
    <polygon points="30,10 0,25 0,55 30,40" fill="#0f172a" stroke="#334155"/>
    <rect x="-12" y="-5" width="24" height="12" rx="2" fill="#00D4FF" opacity="0.6"/>
    <circle cx="0" cy="30" r="4" fill="#00D4FF" opacity="0.8"/>
  </g>

  <!-- Left node -->
  <g class="at-node-body" data-glow transform="translate(150,280)">
    <circle class="at-ring-pulse" cx="0" cy="-10" r="20" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0"/>
    <polygon points="-28,8 0,-18 28,8 0,22" fill="url(#at-top)" stroke="#475569"/>
    <polygon points="-28,8 0,22 0,50 -28,36" fill="url(#at-node)" stroke="#334155"/>
    <polygon points="28,8 0,22 0,50 28,36" fill="#0f172a" stroke="#334155"/>
    <rect x="-10" y="-6" width="20" height="10" rx="2" fill="#7C3AED" opacity="0.5"/>
  </g>

  <!-- Right node -->
  <g class="at-node-body" data-glow transform="translate(450,280)">
    <circle class="at-ring-pulse" cx="0" cy="-10" r="20" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0"/>
    <polygon points="-28,8 0,-18 28,8 0,22" fill="url(#at-top)" stroke="#475569"/>
    <polygon points="-28,8 0,22 0,50 -28,36" fill="url(#at-node)" stroke="#334155"/>
    <polygon points="28,8 0,22 0,50 28,36" fill="#0f172a" stroke="#334155"/>
    <rect x="-10" y="-6" width="20" height="10" rx="2" fill="#F59E0B" opacity="0.5"/>
  </g>

  <!-- Front-left node -->
  <g class="at-node-body" data-glow transform="translate(220,320)">
    <polygon points="-24,6 0,-14 24,6 0,18" fill="url(#at-top)" stroke="#475569"/>
    <polygon points="-24,6 0,18 0,42 -24,30" fill="url(#at-node)" stroke="#334155"/>
    <polygon points="24,6 0,18 0,42 24,30" fill="#0f172a" stroke="#334155"/>
  </g>

  <!-- Front-right node -->
  <g class="at-node-body" data-glow transform="translate(380,320)">
    <polygon points="-24,6 0,-14 24,6 0,18" fill="url(#at-top)" stroke="#475569"/>
    <polygon points="-24,6 0,18 0,42 -24,30" fill="url(#at-node)" stroke="#334155"/>
    <polygon points="24,6 0,18 0,42 24,30" fill="#0f172a" stroke="#334155"/>
  </g>

  <!-- Satellite dish -->
  <g class="at-satellite" transform="translate(300,75)">
    <path class="at-beam" d="M-60 20 L60 20" stroke="#7C3AED" stroke-width="2" opacity="0"/>
    <path class="at-radar-arc" d="M-40 20 A50 50 0 0 1 40 20" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0.4"/>
    <path class="at-radar-arc" d="M-30 20 A40 40 0 0 1 30 20" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0.3" style="animation-delay:0.5s"/>
    <ellipse cx="0" cy="20" rx="35" ry="12" fill="url(#at-top)" stroke="#475569" transform="rotate(-15)"/>
    <ellipse cx="0" cy="18" rx="28" ry="9" fill="#0f172a" stroke="#00D4FF" stroke-width="1" opacity="0.7" transform="rotate(-15)"/>
    <rect x="-3" y="20" width="6" height="25" fill="#475569"/>
    <rect x="-12" y="42" width="24" height="6" rx="2" fill="#334155"/>
    <circle cx="0" cy="18" r="3" fill="#00D4FF" opacity="0.8" transform="rotate(-15)"/>
  </g>

  <!-- Platform base -->
  <ellipse cx="300" cy="395" rx="180" ry="25" fill="#0f172a" opacity="0.25"/>
  <ellipse cx="300" cy="392" rx="140" ry="18" fill="none" stroke="#334155" stroke-width="1" opacity="0.5"/>
</svg>
