<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450" role="img" aria-label="Diverse team of three figures united around a glowing idea orb with connection lines to mission icons">
  <defs>
    <linearGradient id="am-glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2438" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="am-orb" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <filter id="am-glow-amber">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style><![CDATA[
    @keyframes am-orb-pulse { 0%,100% { opacity: 0.75; r: 42; } 50% { opacity: 1; r: 46; } }
    @keyframes am-heartbeat { 0%,100% { transform: scale(1); } 50% { transform: scale(1.015); } }
    @keyframes am-filament { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
    .am-orb-glow { animation: am-orb-pulse 2.5s ease-in-out infinite; }
    .am-figure { animation: am-heartbeat 3s ease-in-out infinite; transform-origin: center bottom; }
    .am-figure:nth-child(2) { animation-delay: -1s; }
    .am-figure:nth-child(3) { animation-delay: -2s; }
    .am-filament { animation: am-filament 2s ease-in-out infinite; }
    .am-orb, .am-figure-head, .am-conn-line, .am-icon { transition: filter 0.45s ease, opacity 0.45s ease, transform 0.45s cubic-bezier(0.34,1.56,0.64,1); transition-delay: var(--delay, 0s); }
    .am-conn-line { stroke-dasharray: 120; stroke-dashoffset: 120; }
    svg.hovered .am-orb { filter: drop-shadow(0 0 12px #F59E0B) drop-shadow(0 0 30px #F59E0B88); }
    svg.hovered .am-figure-head { filter: drop-shadow(0 0 8px var(--glow-color, #00D4FF)); }
    svg.hovered .am-conn-line { stroke-dashoffset: 0; filter: drop-shadow(0 0 4px var(--line-color, #00D4FF)); }
    svg.hovered .am-icon { transform: scale(1.15); filter: drop-shadow(0 0 12px var(--icon-color, #F59E0B)); }
    @keyframes am-spark { 0%,100% { opacity: 0.4; } 50% { opacity: 1; r: 6; } }
    @keyframes am-ray { 0%,100% { opacity: 0.3; } 50% { opacity: 0.8; } }
    .am-spark { animation: am-spark 2s ease-in-out infinite; }
    .am-ray { animation: am-ray 2.5s ease-in-out infinite; transform-origin: 300px 175px; }
    svg.is-paused * { animation-play-state: paused !important; }
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  ]]></style>
  <script><![CDATA[
    (function () {
      var svg = document.currentScript && document.currentScript.parentElement;
      if (!svg) return;
      svg.querySelectorAll('[data-glow]').forEach(function (el, i) {
        el.style.setProperty('--delay', (i * 0.3) + 's');
      });
      svg.addEventListener('mouseenter', function () { svg.classList.add('hovered'); });
      svg.addEventListener('mouseleave', function () { svg.classList.remove('hovered'); });
    })();
  ]]></script>

  <!-- Connection lines -->
  <line class="am-conn-line" data-glow x1="300" y1="175" x2="120" y2="120" stroke="#00D4FF" stroke-width="2" style="--line-color:#00D4FF"/>
  <line class="am-conn-line" data-glow x1="300" y1="175" x2="480" y2="120" stroke="#7C3AED" stroke-width="2" style="--line-color:#7C3AED"/>
  <line class="am-conn-line" data-glow x1="300" y1="175" x2="120" y2="330" stroke="#F59E0B" stroke-width="2" style="--line-color:#F59E0B"/>
  <line class="am-conn-line" data-glow x1="300" y1="175" x2="480" y2="330" stroke="#00D4FF" stroke-width="2" style="--line-color:#00D4FF"/>

  <!-- Outer icons -->
  <g class="am-icon" data-glow transform="translate(95,95)" style="--icon-color:#00D4FF">
    <rect x="-28" y="-28" width="56" height="56" rx="14" fill="url(#am-glass)" stroke="#334155"/>
    <rect x="-14" y="-8" width="8" height="20" rx="2" fill="#00D4FF" opacity="0.8"/>
    <rect x="-2" y="-14" width="8" height="26" rx="2" fill="#00D4FF"/>
    <rect x="10" y="-4" width="8" height="16" rx="2" fill="#00D4FF" opacity="0.7"/>
    <text y="38" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui">Data</text>
  </g>
  <g class="am-icon" data-glow transform="translate(505,95)" style="--icon-color:#7C3AED">
    <rect x="-28" y="-28" width="56" height="56" rx="14" fill="url(#am-glass)" stroke="#334155"/>
    <path d="M-10 -5 Q0 -18 10 -5 Q15 5 0 12 Q-15 5 -10 -5" fill="none" stroke="#7C3AED" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#7C3AED"/>
    <text y="38" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui">Creativity</text>
  </g>
  <g class="am-icon" data-glow transform="translate(95,345)" style="--icon-color:#F59E0B">
    <rect x="-28" y="-28" width="56" height="56" rx="14" fill="url(#am-glass)" stroke="#334155"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#F59E0B" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#F59E0B"/>
    <line x1="0" y1="-14" x2="0" y2="-20" stroke="#F59E0B" stroke-width="2"/>
    <text y="38" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui">Strategy</text>
  </g>
  <g class="am-icon" data-glow transform="translate(505,345)" style="--icon-color:#22c55e">
    <rect x="-28" y="-28" width="56" height="56" rx="14" fill="url(#am-glass)" stroke="#334155"/>
    <path d="M-12 8 L-4 -8 L4 0 L12 -12" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
    <text y="38" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui">Growth</text>
  </g>

  <!-- Central orb / lightbulb -->
  <line class="am-ray" x1="300" y1="175" x2="300" y2="100" stroke="#F59E0B" stroke-width="1" opacity="0.3"/>
  <line class="am-ray" x1="300" y1="175" x2="370" y2="130" stroke="#00D4FF" stroke-width="1" opacity="0.3" style="animation-delay:-0.5s"/>
  <circle class="am-spark" cx="300" cy="130" r="4" fill="#FBBF24"/>
  <circle class="am-orb-glow" cx="300" cy="175" r="42" fill="url(#am-orb)" opacity="0.4"/>
  <g class="am-orb" data-glow transform="translate(300,175)">
    <ellipse cx="0" cy="5" rx="28" ry="32" fill="url(#am-glass)" stroke="#F59E0B" stroke-width="2"/>
    <path class="am-filament" d="M-8 10 Q0 -5 8 10" fill="none" stroke="#FBBF24" stroke-width="2"/>
    <path class="am-filament" d="M-4 10 L4 10" stroke="#FBBF24" stroke-width="1.5"/>
    <rect x="-6" y="32" width="12" height="8" rx="2" fill="#475569"/>
    <line x1="-4" y1="40" x2="-4" y2="48" stroke="#64748b" stroke-width="2"/>
    <line x1="4" y1="40" x2="4" y2="48" stroke="#64748b" stroke-width="2"/>
  </g>

  <!-- Three figures -->
  <g class="am-figure" transform="translate(175,320)">
    <ellipse cx="0" cy="55" rx="30" ry="9" fill="#0f172a" opacity="0.35"/>
    <path d="M-22 55 L-18 20 L18 20 L22 55 Z" fill="url(#am-glass)" stroke="#334155"/>
    <rect class="am-figure-head" data-glow x="-14" y="0" width="28" height="22" rx="6" fill="#1e293b" stroke="#00D4FF" style="--glow-color:#00D4FF"/>
  </g>
  <g class="am-figure" transform="translate(300,335)">
    <ellipse cx="0" cy="55" rx="32" ry="9" fill="#0f172a" opacity="0.35"/>
    <path d="M-24 55 L-20 18 L20 18 L24 55 Z" fill="url(#am-glass)" stroke="#334155"/>
    <rect class="am-figure-head" data-glow x="-16" y="-2" width="32" height="24" rx="6" fill="#1e293b" stroke="#7C3AED" style="--glow-color:#7C3AED"/>
  </g>
  <g class="am-figure" transform="translate(425,320)">
    <ellipse cx="0" cy="55" rx="30" ry="9" fill="#0f172a" opacity="0.35"/>
    <path d="M-22 55 L-18 20 L18 20 L22 55 Z" fill="url(#am-glass)" stroke="#334155"/>
    <rect class="am-figure-head" data-glow x="-14" y="0" width="28" height="22" rx="6" fill="#1e293b" stroke="#F59E0B" style="--glow-color:#F59E0B"/>
  </g>
</svg>
