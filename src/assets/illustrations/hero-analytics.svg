<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450" role="img" aria-label="Analytics dashboard with bar charts, line graphs, world map hotspots, and analyst character">
  <defs>
    <linearGradient id="ha-glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2438" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="ha-bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <clipPath id="ha-map-clip">
      <ellipse cx="420" cy="175" rx="95" ry="55"/>
    </clipPath>
  </defs>
  <style><![CDATA[
    @keyframes ha-hotspot { 0%,100% { r: 4; opacity: 0.5; } 50% { r: 8; opacity: 0.9; } }
    @keyframes ha-ring { 0% { r: 6; opacity: 0.8; } 100% { r: 18; opacity: 0; } }
    @keyframes ha-breathe { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(1.02); } }
    @keyframes ha-line-draw { from { stroke-dashoffset: 200; } to { stroke-dashoffset: 0; } }
    .ha-bar { transform-origin: bottom center; animation: ha-breathe 4s ease-in-out infinite; transition: filter 0.4s ease; transition-delay: var(--delay, 0s); }
    .ha-hotspot-core { animation: ha-hotspot 3s ease-in-out infinite; }
    .ha-hotspot-ring { animation: ha-ring 2s ease-out infinite; }
    .ha-line { stroke-dasharray: 200; stroke-dashoffset: 200; transition: stroke-dashoffset 0.8s ease, filter 0.4s ease; transition-delay: var(--delay, 0s); }
    .ha-character, .ha-pointer { transition: filter 0.4s ease, transform 0.4s ease; }
    svg.hovered .ha-bar { filter: drop-shadow(0 0 8px #F59E0B) drop-shadow(0 0 18px #F59E0B88); }
    svg.hovered .ha-line { stroke-dashoffset: 0; filter: drop-shadow(0 0 6px #00D4FF); }
    svg.hovered .ha-hotspot-group { filter: drop-shadow(0 0 8px #7C3AED); }
    svg.hovered .ha-character { filter: drop-shadow(0 0 10px #00D4FF88); }
    svg.hovered .ha-pointer { filter: drop-shadow(0 0 10px #F59E0B); transform: translate(4px,-4px); }
    svg.hovered .ha-panel { filter: drop-shadow(0 0 20px #00D4FF44); }
    @keyframes ha-scan { 0% { transform: translateY(-60px); opacity: 0; } 30% { opacity: 0.6; } 100% { transform: translateY(200px); opacity: 0; } }
    @keyframes ha-spark { 0%,100% { opacity: 0.3; r: 2; } 50% { opacity: 1; r: 3.5; } }
    .ha-scan-line { animation: ha-scan 3s linear infinite; }
    .ha-spark { animation: ha-spark 2s ease-in-out infinite; }
    svg.is-paused * { animation-play-state: paused !important; }
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  ]]></style>
  <script><![CDATA[
    (function () {
      var svg = document.currentScript && document.currentScript.parentElement;
      if (!svg) return;
      svg.querySelectorAll('[data-glow]').forEach(function (el, i) {
        el.style.setProperty('--delay', (i * 0.15) + 's');
      });
      svg.addEventListener('mouseenter', function () { svg.classList.add('hovered'); });
      svg.addEventListener('mouseleave', function () { svg.classList.remove('hovered'); });
    })();
  ]]></script>

  <!-- Dashboard panel -->
  <rect class="ha-panel" data-glow x="120" y="55" width="360" height="280" rx="16" fill="url(#ha-glass)" stroke="#334155" stroke-width="1.5"/>
  <rect class="ha-scan-line" x="135" y="100" width="330" height="2" fill="#00D4FF" opacity="0.35"/>
  <rect x="135" y="70" width="330" height="28" rx="6" fill="#0f172a" opacity="0.6"/>
  <circle cx="152" cy="84" r="5" fill="#ef4444" opacity="0.8"/>
  <circle cx="168" cy="84" r="5" fill="#F59E0B" opacity="0.8"/>
  <circle cx="184" cy="84" r="5" fill="#22c55e" opacity="0.8"/>
  <text x="300" y="88" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui,sans-serif">Campaign Analytics</text>

  <!-- Bar chart -->
  <g transform="translate(155,240)">
    <rect class="ha-bar" data-glow x="0" y="-45" width="22" height="45" rx="3" fill="url(#ha-bar)"/>
    <rect class="ha-bar" data-glow x="32" y="-72" width="22" height="72" rx="3" fill="url(#ha-bar)"/>
    <rect class="ha-bar" data-glow x="64" y="-58" width="22" height="58" rx="3" fill="url(#ha-bar)"/>
    <rect class="ha-bar" data-glow x="96" y="-88" width="22" height="88" rx="3" fill="url(#ha-bar)"/>
    <rect class="ha-bar" data-glow x="128" y="-65" width="22" height="65" rx="3" fill="url(#ha-bar)"/>
    <line x1="-5" y1="0" x2="160" y2="0" stroke="#334155" stroke-width="1"/>
  </g>

  <!-- Line graph -->
  <path class="ha-line" data-glow d="M155 195 L195 175 L235 185 L275 155 L315 165 L355 140 L395 150" fill="none" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="395" cy="150" r="4" fill="#00D4FF" opacity="0.8"/>

  <!-- World map -->
  <g clip-path="url(#ha-map-clip)">
    <ellipse cx="420" cy="175" rx="95" ry="55" fill="#0f172a" stroke="#334155"/>
    <path d="M360 165 Q390 150 420 160 Q450 170 480 155 Q500 165 490 180 Q460 195 420 190 Q380 185 360 165" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
  </g>
  <g class="ha-hotspot-group" data-glow transform="translate(400,158)">
    <circle class="ha-hotspot-ring" cx="0" cy="0" r="6" fill="none" stroke="#7C3AED" stroke-width="1"/>
    <circle class="ha-hotspot-core" cx="0" cy="0" r="4" fill="#7C3AED"/>
  </g>
  <g class="ha-hotspot-group" data-glow transform="translate(445,172)">
    <circle class="ha-hotspot-ring" cx="0" cy="0" r="6" fill="none" stroke="#7C3AED" stroke-width="1" style="animation-delay:0.3s"/>
    <circle class="ha-hotspot-core" cx="0" cy="0" r="4" fill="#7C3AED" style="animation-delay:0.3s"/>
  </g>
  <g class="ha-hotspot-group" data-glow transform="translate(418,188)">
    <circle class="ha-hotspot-ring" cx="0" cy="0" r="6" fill="none" stroke="#7C3AED" stroke-width="1" style="animation-delay:0.6s"/>
    <circle class="ha-hotspot-core" cx="0" cy="0" r="4" fill="#7C3AED" style="animation-delay:0.6s"/>
  </g>

  <circle class="ha-spark" cx="100" cy="70" r="2" fill="#00D4FF"/>
  <circle class="ha-spark" cx="520" cy="380" r="2" fill="#7C3AED" style="animation-delay:-1s"/>
  <g class="ha-character" data-glow transform="translate(55,200)">
    <ellipse cx="35" cy="95" rx="28" ry="10" fill="#0f172a" opacity="0.4"/>
    <path d="M20 45 L35 30 L50 45 L50 85 L20 85 Z" fill="url(#ha-glass)" stroke="#475569"/>
    <circle cx="35" cy="38" r="12" fill="#1e293b" stroke="#00D4FF" stroke-width="1"/>
    <rect x="28" y="55" width="14" height="22" rx="3" fill="#334155"/>
    <path class="ha-pointer" data-glow d="M52 50 L95 35" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
    <circle class="ha-pointer" data-glow cx="95" cy="35" r="5" fill="#F59E0B"/>
  </g>

  <!-- Floating stat chips -->
  <rect x="430" y="320" width="72" height="28" rx="14" fill="#0f172a" stroke="#00D4FF" stroke-width="1" opacity="0.8"/>
  <text x="466" y="338" text-anchor="middle" fill="#00D4FF" font-size="11" font-weight="bold" font-family="system-ui">+24%</text>
  <rect x="480" y="355" width="80" height="28" rx="14" fill="#0f172a" stroke="#7C3AED" stroke-width="1" opacity="0.8"/>
  <text x="520" y="373" text-anchor="middle" fill="#7C3AED" font-size="11" font-weight="bold" font-family="system-ui">2.4x ROI</text>
</svg>
