<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450" role="img" aria-label="Market trends growth chart with rocket launch, orbiting data bubbles, and global globe">
  <defs>
    <linearGradient id="st-trend" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="st-globe" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <linearGradient id="st-rocket" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
  </defs>
  <style><![CDATA[
    @keyframes st-orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes st-orbit-rev { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    @keyframes st-thruster { 0%,100% { opacity: 0.6; ry: 4; } 50% { opacity: 1; ry: 6; } }
    @keyframes st-particle { 0% { opacity: 0.8; cy: 0; } 100% { opacity: 0; cy: 20; } }
    @keyframes st-globe-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .st-globe-group { transform-origin: 480px 120px; animation: st-globe-spin 30s linear infinite; }
    .st-orbit-a { transform-origin: 300px 280px; animation: st-orbit 12s linear infinite; }
    .st-orbit-b { transform-origin: 300px 280px; animation: st-orbit-rev 16s linear infinite; }
    .st-thruster { animation: st-thruster 0.4s ease-in-out infinite; }
    .st-trend-line { stroke-dasharray: 400; stroke-dashoffset: 400; transition: stroke-dashoffset 1.2s ease, filter 0.4s ease; }
    .st-bubble { transition: transform 0.4s ease, filter 0.4s ease; transition-delay: var(--delay, 0s); }
    .st-rocket-group { transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1); }
    .st-country { transition: fill 0.4s ease, opacity 0.4s ease; }
    svg.hovered .st-trend-line { stroke-dashoffset: 0; filter: drop-shadow(0 0 8px #00D4FF) drop-shadow(0 0 20px #00D4FF66); }
    svg.hovered .st-bubble { transform: scale(1.1); filter: drop-shadow(0 0 10px #7C3AED); }
    svg.hovered .st-rocket-group { transform: translateY(-28px) scale(1.05); }
    svg.hovered .st-trail { opacity: 1; }
    @keyframes st-spark-trail { 0% { opacity: 0.9; cy: 0; } 100% { opacity: 0; cy: 30; } }
    @keyframes st-line-glow { 0%,100% { stroke-width: 3.5; } 50% { stroke-width: 5; } }
    .st-trail { opacity: 0.5; animation: st-spark-trail 0.8s ease-out infinite; }
    svg.hovered .st-trend-line { animation: st-line-glow 1.5s ease-in-out infinite; }
    svg.is-paused * { animation-play-state: paused !important; }
    svg.hovered .st-particle { animation: st-particle 0.6s ease-out forwards; }
    svg.hovered .st-country { fill: #7C3AED; opacity: 0.8; }
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  ]]></style>
  <script><![CDATA[
    (function () {
      var svg = document.currentScript && document.currentScript.parentElement;
      if (!svg) return;
      svg.querySelectorAll('[data-glow]').forEach(function (el, i) {
        el.style.setProperty('--delay', (i * 0.2) + 's');
      });
      svg.addEventListener('mouseenter', function () { svg.classList.add('hovered'); });
      svg.addEventListener('mouseleave', function () { svg.classList.remove('hovered'); });
    })();
  ]]></script>

  <!-- Background globe -->
  <g class="st-globe-group" opacity="0.35">
    <circle cx="480" cy="120" r="70" fill="url(#st-globe)" stroke="#334155"/>
    <ellipse cx="480" cy="120" rx="70" ry="20" fill="none" stroke="#475569" stroke-width="0.8"/>
    <ellipse cx="480" cy="120" rx="20" ry="70" fill="none" stroke="#475569" stroke-width="0.8"/>
    <path class="st-country" d="M450 100 Q470 90 490 100 Q500 115 485 125 Q465 130 450 115 Z" fill="#334155" opacity="0.5"/>
    <path class="st-country" d="M510 95 Q530 105 525 120 Q515 135 500 125 Z" fill="#334155" opacity="0.5"/>
  </g>

  <!-- Grid -->
  <g opacity="0.12">
    <path d="M60 350 H540 M60 290 H540 M60 230 H540 M60 170 H540" stroke="#64748b"/>
    <path d="M120 130 V380 M220 130 V380 M320 130 V380 M420 130 V380 M520 130 V380" stroke="#64748b"/>
  </g>

  <!-- Trend area fill -->
  <path d="M80 340 L140 310 L200 280 L260 250 L320 210 L380 170 L440 130 L500 95 L500 380 L80 380 Z" fill="#00D4FF" opacity="0.06"/>
  <path class="st-trend-line" data-glow d="M80 340 L140 310 L200 280 L260 250 L320 210 L380 170 L440 130 L500 95" fill="none" stroke="url(#st-trend)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data bubbles orbit -->
  <g class="st-orbit-a">
    <g class="st-bubble" data-glow transform="translate(180,200)">
      <rect x="-36" y="-14" width="72" height="28" rx="14" fill="#0f172a" stroke="#7C3AED" stroke-width="1.5"/>
      <text y="5" text-anchor="middle" fill="#7C3AED" font-size="12" font-weight="bold" font-family="system-ui">+24%</text>
    </g>
  </g>
  <g class="st-orbit-b">
    <g class="st-bubble" data-glow transform="translate(420,240)">
      <rect x="-42" y="-14" width="84" height="28" rx="14" fill="#0f172a" stroke="#00D4FF" stroke-width="1.5"/>
      <text y="5" text-anchor="middle" fill="#00D4FF" font-size="12" font-weight="bold" font-family="system-ui">2.4x ROI</text>
    </g>
  </g>
  <g class="st-orbit-a" style="animation-delay:-4s">
    <g class="st-bubble" data-glow transform="translate(350,320)">
      <rect x="-40" y="-14" width="80" height="28" rx="14" fill="#0f172a" stroke="#F59E0B" stroke-width="1.5"/>
      <text y="5" text-anchor="middle" fill="#F59E0B" font-size="12" font-weight="bold" font-family="system-ui">+18% CTR</text>
    </g>
  </g>

  <!-- Rocket at peak -->
  <g class="st-rocket-group" transform="translate(500,95)">
    <ellipse class="st-trail" cx="0" cy="30" rx="4" ry="6" fill="#F59E0B" opacity="0"/>
    <ellipse class="st-trail" cx="-8" cy="28" rx="3" ry="5" fill="#F59E0B" opacity="0" style="animation-delay:0.15s"/>
    <ellipse class="st-particle" cx="-6" cy="28" rx="2" ry="3" fill="#F59E0B" opacity="0" style="animation-delay:0.1s"/>
    <ellipse class="st-particle" cx="6" cy="28" rx="2" ry="3" fill="#F59E0B" opacity="0" style="animation-delay:0.2s"/>
    <ellipse class="st-thruster" cx="0" cy="28" rx="8" ry="4" fill="#F59E0B" opacity="0.7"/>
    <path d="M0 -35 L12 15 L6 15 L6 25 L-6 25 L-6 15 L-12 15 Z" fill="url(#st-rocket)" stroke="#F59E0B" stroke-width="1"/>
    <circle cx="0" cy="-5" r="5" fill="#fff" opacity="0.3"/>
    <path d="M-12 5 L-20 18 L-10 15 Z" fill="#64748b"/>
    <path d="M12 5 L20 18 L10 15 Z" fill="#64748b"/>
  </g>

  <!-- Axis labels -->
  <text x="80" y="400" fill="#64748b" font-size="10" font-family="system-ui">Q1</text>
  <text x="200" y="400" fill="#64748b" font-size="10" font-family="system-ui">Q2</text>
  <text x="320" y="400" fill="#64748b" font-size="10" font-family="system-ui">Q3</text>
  <text x="440" y="400" fill="#64748b" font-size="10" font-family="system-ui">Q4</text>
</svg>
