<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450" role="img" aria-label="Competitive ad intelligence scanner with magnifying glass over competitor ad grid">
  <defs>
    <linearGradient id="sai-glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f35" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="sai-lens" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#00D4FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="sai-scan-clip">
      <rect x="0" y="0" width="0" height="450">
        <animate attributeName="width" values="0;600;600;0" dur="4s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>
  <style><![CDATA[
    @keyframes sai-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes sai-scan { 0% { transform: translateX(-120px); opacity: 0; } 20% { opacity: 0.8; } 80% { opacity: 0.8; } 100% { transform: translateX(520px); opacity: 0; } }
    @keyframes sai-check-pop { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 1; } }
    .sai-mag { animation: sai-bob 3s ease-in-out infinite; transform-origin: 380px 200px; }
    .sai-scan-line { animation: sai-scan 3s linear infinite; }
    .sai-thumb { transition: filter 0.35s ease, stroke 0.35s ease; transition-delay: var(--delay, 0s); }
    .sai-lens { transition: filter 0.4s ease; }
    .sai-check { opacity: 0; transform: scale(0); transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1); transition-delay: var(--delay, 0s); }
    svg.hovered .sai-lens { filter: drop-shadow(0 0 12px #00D4FF) drop-shadow(0 0 28px #00D4FF66); }
    svg.hovered .sai-thumb { filter: drop-shadow(0 0 6px #F59E0B); stroke: #F59E0B; stroke-width: 2; }
    svg.hovered .sai-check { opacity: 1; transform: scale(1); }
    svg.hovered .sai-scan-line { animation-duration: 0.8s; opacity: 1; }
    svg.hovered .sai-mag { transform: scale(1.05); }
    @keyframes sai-lens-pulse { 0%,100% { r: 55; opacity: 0.8; } 50% { r: 60; opacity: 1; } }
    @keyframes sai-sparkle { 0%,100% { opacity: 0; transform: scale(0); } 50% { opacity: 1; transform: scale(1); } }
    .sai-lens-ring { animation: sai-lens-pulse 2s ease-in-out infinite; }
    .sai-sparkle { animation: sai-sparkle 2s ease-in-out infinite; }
    .sai-mag { transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1); }
    svg.is-paused * { animation-play-state: paused !important; }
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  ]]></style>
  <script><![CDATA[
    (function () {
      var svg = document.currentScript && document.currentScript.parentElement;
      if (!svg) return;
      svg.querySelectorAll('[data-glow]').forEach(function (el, i) {
        el.style.setProperty('--delay', (i * 0.15) + 's');
      });
      svg.addEventListener('mouseenter', function () { svg.classList.add('hovered'); });
      svg.addEventListener('mouseleave', function () { svg.classList.remove('hovered'); });
    })();
  ]]></script>

  <!-- Grid background panel -->
  <rect x="80" y="70" width="340" height="300" rx="14" fill="url(#sai-glass)" stroke="#334155" stroke-width="1.5"/>
  <text x="250" y="98" text-anchor="middle" fill="#64748b" font-size="11" font-family="system-ui" letter-spacing="0.1em">COMPETITOR AD GRID</text>

  <!-- Ad thumbnails row 1 -->
  <g class="sai-thumb" data-glow transform="translate(100,115)">
    <rect width="90" height="70" rx="8" fill="#0f172a" stroke="#334155"/>
    <rect x="8" y="8" width="74" height="36" rx="4" fill="#1e293b"/>
    <rect x="8" y="52" width="40" height="6" rx="2" fill="#475569"/>
    <g class="sai-check" transform="translate(72,4)"><circle r="10" fill="#22c55e"/><path d="M-4 0 L-1 3 L5 -4" stroke="#fff" stroke-width="2" fill="none"/></g>
  </g>
  <g class="sai-thumb" data-glow transform="translate(205,115)">
    <rect width="90" height="70" rx="8" fill="#0f172a" stroke="#334155"/>
    <polygon points="45,20 58,38 45,56 32,38" fill="#7C3AED" opacity="0.4"/>
    <rect x="8" y="52" width="50" height="6" rx="2" fill="#475569"/>
    <g class="sai-check" transform="translate(72,4)"><circle r="10" fill="#22c55e"/><path d="M-4 0 L-1 3 L5 -4" stroke="#fff" stroke-width="2" fill="none"/></g>
  </g>
  <g class="sai-thumb" data-glow transform="translate(310,115)">
    <rect width="90" height="70" rx="8" fill="#0f172a" stroke="#334155"/>
    <rect x="8" y="8" width="74" height="36" rx="4" fill="#1e293b"/>
    <text x="45" y="32" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui">TEXT AD</text>
    <g class="sai-check" transform="translate(72,4)"><circle r="10" fill="#22c55e"/><path d="M-4 0 L-1 3 L5 -4" stroke="#fff" stroke-width="2" fill="none"/></g>
  </g>

  <!-- Row 2 -->
  <g class="sai-thumb" data-glow transform="translate(100,200)">
    <rect width="90" height="70" rx="8" fill="#0f172a" stroke="#334155"/>
    <circle cx="45" cy="30" r="14" fill="#F59E0B" opacity="0.5"/>
    <rect x="8" y="52" width="55" height="6" rx="2" fill="#475569"/>
    <g class="sai-check" transform="translate(72,4)"><circle r="10" fill="#22c55e"/><path d="M-4 0 L-1 3 L5 -4" stroke="#fff" stroke-width="2" fill="none"/></g>
  </g>
  <g class="sai-thumb" data-glow transform="translate(205,200)">
    <rect width="90" height="70" rx="8" fill="#0f172a" stroke="#334155"/>
    <rect x="8" y="8" width="74" height="36" rx="4" fill="#0f172a" stroke="#00D4FF" stroke-width="1"/>
    <polygon points="45,18 52,28 45,38 38,28" fill="#00D4FF" opacity="0.6"/>
    <g class="sai-check" transform="translate(72,4)"><circle r="10" fill="#22c55e"/><path d="M-4 0 L-1 3 L5 -4" stroke="#fff" stroke-width="2" fill="none"/></g>
  </g>
  <g class="sai-thumb" data-glow transform="translate(310,200)">
    <rect width="90" height="70" rx="8" fill="#0f172a" stroke="#334155"/>
    <rect x="8" y="8" width="74" height="36" rx="4" fill="#1e293b"/>
    <rect x="8" y="52" width="35" height="6" rx="2" fill="#F59E0B" opacity="0.7"/>
    <g class="sai-check" transform="translate(72,4)"><circle r="10" fill="#22c55e"/><path d="M-4 0 L-1 3 L5 -4" stroke="#fff" stroke-width="2" fill="none"/></g>
  </g>

  <!-- Row 3 -->
  <g class="sai-thumb" data-glow transform="translate(152,285)">
    <rect width="90" height="70" rx="8" fill="#0f172a" stroke="#334155"/>
    <path d="M15 45 L30 25 L45 40 L60 22 L75 45" fill="none" stroke="#7C3AED" stroke-width="2"/>
    <g class="sai-check" transform="translate(72,4)"><circle r="10" fill="#22c55e"/><path d="M-4 0 L-1 3 L5 -4" stroke="#fff" stroke-width="2" fill="none"/></g>
  </g>
  <g class="sai-thumb" data-glow transform="translate(257,285)">
    <rect width="90" height="70" rx="8" fill="#0f172a" stroke="#334155"/>
    <rect x="8" y="8" width="74" height="36" rx="4" fill="#1e293b"/>
    <rect x="8" y="52" width="60" height="6" rx="2" fill="#475569"/>
    <g class="sai-check" transform="translate(72,4)"><circle r="10" fill="#22c55e"/><path d="M-4 0 L-1 3 L5 -4" stroke="#fff" stroke-width="2" fill="none"/></g>
  </g>

  <!-- Scan rays -->
  <rect class="sai-scan-line" x="0" y="0" width="3" height="450" fill="url(#sai-lens)" opacity="0.5"/>
  <line class="sai-scan-line" x1="0" y1="225" x2="600" y2="225" stroke="#7C3AED" stroke-width="1" opacity="0.3"/>

  <!-- Magnifying glass -->
  <g class="sai-mag">
    <g class="sai-lens" data-glow>
      <circle class="sai-lens-ring" cx="380" cy="200" r="55" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
      <circle class="sai-sparkle" cx="410" cy="175" r="3" fill="#F59E0B" style="animation-delay:-0.5s"/>
      <circle cx="380" cy="200" r="42" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.4"/>
      <ellipse cx="365" cy="188" rx="18" ry="10" fill="#fff" opacity="0.15" transform="rotate(-30 365 188)"/>
    </g>
    <line x1="420" y1="240" x2="470" y2="310" stroke="#475569" stroke-width="10" stroke-linecap="round"/>
    <line x1="420" y1="240" x2="470" y2="310" stroke="#64748b" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
